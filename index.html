<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projet TARDIS - Accueil</title>
    <style>
        /* =========================================
           RESET & PARAMÈTRES MOBILES
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #020617; color: #ffffff;
            height: 100dvh; overflow: hidden; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* =========================================
           ARRIÈRE-PLAN : VORTEX NORMAL
           ========================================= */
        .vortex-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .light-trail {
            position: absolute; width: 2px; height: 120px;
            background: linear-gradient(to bottom, rgba(56, 189, 248, 0), rgba(56, 189, 248, 0.8));
            opacity: 0; animation: speedTrail 2s linear infinite;
        }
        
        .trail-1 { left: 15%; animation-delay: 0.1s; animation-duration: 1.2s; }
        .trail-2 { left: 35%; animation-delay: 0.6s; animation-duration: 1.5s; height: 160px; }
        .trail-3 { left: 50%; animation-delay: 0.3s; animation-duration: 1.1s; }
        .trail-4 { left: 75%; animation-delay: 0.9s; animation-duration: 1.8s; height: 90px; }
        .trail-5 { left: 85%; animation-delay: 0.4s; animation-duration: 1.3s; }
        .trail-6 { left: 25%; animation-delay: 0.8s; animation-duration: 1.4s; height: 140px; }
        .trail-7 { left: 65%; animation-delay: 0.2s; animation-duration: 1.6s; }

        @keyframes speedTrail {
            0% { transform: translateY(-150px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* =========================================
           INTERFACE PRINCIPALE
           ========================================= */
        .content-wrapper {
            position: relative; z-index: 10; display: flex; flex-direction: column;
            align-items: center; width: 88%; 
            animation: cinematicEnter 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            transform-origin: center center;
        }
        @keyframes cinematicEnter {
            0% { opacity: 0; transform: scale(0.9) translateY(40px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        h1 {
            font-size: 3.2rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 10px;
            color: #ffffff; animation: tardisPulse 3s infinite alternate; text-transform: uppercase;
        }
        @keyframes tardisPulse {
            0%, 100% { text-shadow: 0 0 10px #38bdf8, 0 0 20px #0284c7; }
            50% { text-shadow: 0 0 20px #38bdf8, 0 0 40px #38bdf8, 0 0 60px #0284c7; }
        }
        p { font-size: 1.1rem; color: #94a3b8; text-align: center; margin-bottom: 45px; line-height: 1.5; }

        /* --- Boutons --- */
        .button-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        .btn {
            position: relative; width: 100%; padding: 18px 20px; font-size: 1.15rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: white;
            background: rgba(15, 23, 42, 0.7); border-radius: 16px; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow: hidden;
            transition: all 0.15s ease-out; cursor: pointer;
        }
        
        .btn-dashboard { border: none; box-shadow: 0 10px 30px rgba(2, 132, 199, 0.3); }
        .btn-dashboard::before {
            content: ''; position: absolute; width: 150%; height: 300%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 70%, #38bdf8 100%);
            animation: spinRadar 3s linear infinite; z-index: -1;
        }
        @keyframes spinRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .btn-dashboard::after { content: ''; position: absolute; inset: 2px; background: #0f172a; border-radius: 14px; z-index: -1; }
        
        .btn-article { border: 2px solid rgba(56, 189, 248, 0.3); }
        .btn:active { transform: scale(0.92); box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); }

        /* =========================================
           NOUVELLE ANIMATION AU CLIC (DÉZOOM + RETOUR)
           ========================================= */

        /* 1. L'interface fait un dézoom prononcé puis revient à sa taille d'origine */
        .warp-zoom-active {
            animation: warpZoom 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        }
        @keyframes warpZoom {
            0% { transform: scale(1); opacity: 1; filter: blur(0); }
            /* Le dézoom (se rétracte à 50% de sa taille) */
            60% { transform: scale(0.5); opacity: 0.8; filter: blur(2px); }
            /* Le retour explosif à la taille initiale (scale 1) en s'effaçant */
            100% { transform: scale(1); opacity: 0; filter: blur(8px); }
        }

        /* 2. Les lumières s'accélèrent et deviennent ultra pétantes */
        .hyper-trails .light-trail {
            animation-duration: 0.25s !important; 
            background: linear-gradient(to bottom, transparent, #38bdf8) !important;
            box-shadow: 0 0 15px #38bdf8, 0 0 30px #0284c7 !important;
        }

    </style>
</head>
<body>

    <div class="vortex-container" id="vortex">
        <div class="light-trail trail-1"></div>
        <div class="light-trail trail-2"></div>
        <div class="light-trail trail-3"></div>
        <div class="light-trail trail-4"></div>
        <div class="light-trail trail-5"></div>
        <div class="light-trail trail-6"></div>
        <div class="light-trail trail-7"></div>
    </div>

    <div class="content-wrapper" id="ui-content">
        <h1>TARDIS</h1>
        <p>Voyagez à travers les données temporelles de la SNCF grâce à notre modèle prédictif.</p>

        <div class="button-container">
            <a href="https://tardis-dashboard.streamlit.app/" id="btn-dash" class="btn btn-dashboard">
                <span class="icon">🚀</span> Lancer le Dashboard
            </a>
            <a href="article.html" class="btn btn-article">
                <span class="icon">📝</span> Lire l'Article
            </a>
        </div>
    </div>

    <script>
        const btnDash = document.getElementById('btn-dash');
        const uiContent = document.getElementById('ui-content');
        const vortex = document.getElementById('vortex');

        btnDash.addEventListener('click', function(event) {
            // 1. Bloque le chargement immédiat de la page
            event.preventDefault(); 
            const link = this.href;

            // 2. Lance l'animation d'aspiration et retour
            uiContent.classList.add('warp-zoom-active');
            
            // 3. Accélère et illumine les faisceaux lumineux
            vortex.classList.add('hyper-trails');

            // 4. Redirige vers le Dashboard à la fin de l'animation (800ms)
            setTimeout(() => {
                window.location.href = link;
            }, 800); 
        });
    </script>
</body>
</html>
