<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projet TARDIS - Accueil</title>
    <style>
        /* =========================================
           RESET & PARAMÈTRES MOBILES
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #020617; color: #ffffff;
            height: 100dvh; overflow: hidden; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* --- Vortex / Fond --- */
        .vortex-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .light-trail {
            position: absolute; width: 2px; height: 120px;
            background: linear-gradient(to bottom, rgba(56, 189, 248, 0), rgba(56, 189, 248, 0.8));
            opacity: 0; animation: speedTrail 2s linear infinite;
        }
        
        /* Répartition des lignes */
        .trail-1 { left: 15%; animation-delay: 0.1s; animation-duration: 1.2s; }
        .trail-2 { left: 35%; animation-delay: 0.6s; animation-duration: 1.5s; height: 160px; }
        .trail-3 { left: 50%; animation-delay: 0.3s; animation-duration: 1.1s; }
        .trail-4 { left: 75%; animation-delay: 0.9s; animation-duration: 1.8s; height: 90px; }
        .trail-5 { left: 85%; animation-delay: 0.4s; animation-duration: 1.3s; }

        @keyframes speedTrail {
            0% { transform: translateY(-150px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* --- Interface --- */
        .content-wrapper {
            position: relative; z-index: 10; display: flex; flex-direction: column;
            align-items: center; width: 88%; 
            animation: cinematicEnter 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes cinematicEnter {
            0% { opacity: 0; transform: scale(0.9) translateY(40px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        h1 {
            font-size: 3.2rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 10px;
            color: #ffffff; animation: tardisPulse 3s infinite alternate; text-transform: uppercase;
        }
        @keyframes tardisPulse {
            0%, 100% { text-shadow: 0 0 10px #38bdf8, 0 0 20px #0284c7; }
            50% { text-shadow: 0 0 20px #38bdf8, 0 0 40px #38bdf8, 0 0 60px #0284c7; }
        }
        p { font-size: 1.1rem; color: #94a3b8; text-align: center; margin-bottom: 45px; line-height: 1.5; }

        /* --- Boutons --- */
        .button-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .btn {
            position: relative; width: 100%; padding: 18px 20px; font-size: 1.15rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: white;
            background: rgba(15, 23, 42, 0.7); border-radius: 16px; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow: hidden;
            transition: all 0.15s ease-out; cursor: pointer;
        }
        .btn-dashboard { border: none; box-shadow: 0 10px 30px rgba(2, 132, 199, 0.3); }
        .btn-dashboard::before {
            content: ''; position: absolute; width: 150%; height: 300%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 70%, #38bdf8 100%);
            animation: spinRadar 3s linear infinite; z-index: -1;
        }
        @keyframes spinRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .btn-dashboard::after { content: ''; position: absolute; inset: 2px; background: #0f172a; border-radius: 14px; z-index: -1; }
        .btn-article { border: 2px solid rgba(56, 189, 248, 0.3); }
        .btn:active { transform: scale(0.92); box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); }

        /* =========================================
           ANIMATION D'IMPACT (LE TRAIN VECTORIEL)
           ========================================= */
        
        /* Conteneur du train SVG */
        #svg-train {
            position: fixed;
            top: 50%; left: 50%;
            width: 150px; height: 150px;
            transform: translate(-50%, -50%) scale(0.01); /* Minuscule au fond */
            z-index: 9998;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 0 10px #38bdf8);
        }

        /* Le flash lumineux aveuglant */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffffff 0%, #38bdf8 100%);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
        }

        /* --- CLASSES AJOUTÉES PAR JAVASCRIPT AU CLIC --- */
        
        /* 1. Le train qui fonce avec un effet de perspective */
        .train-attack {
            animation: rushSVG 1.4s cubic-bezier(0.8, 0, 1, 1) forwards !important;
        }
        @keyframes rushSVG {
            0% { transform: translate(-50%, -50%) scale(0.01) translateY(-50px); opacity: 0; }
            30% { opacity: 1; filter: drop-shadow(0 0 15px #38bdf8); }
            100% { transform: translate(-50%, -50%) scale(30) translateY(10px); opacity: 1; filter: drop-shadow(0 0 100px #38bdf8); }
        }

        /* 2. Le tremblement de l'interface (effet de vitesse) */
        .screen-shake {
            animation: shake 0.3s ease-in-out infinite alternate !important;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* 3. L'accélération temporelle du fond */
        .warp-speed .light-trail {
            animation-duration: 0.2s !important; /* Les lumières défilent à toute vitesse */
            width: 4px; /* Lumières plus épaisses */
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 1));
        }

        /* 4. Le flash final pour cacher le changement de page */
        .flash-boom {
            animation: explodeFlash 1.4s cubic-bezier(0.5, 0, 1, 0.5) forwards;
        }
        @keyframes explodeFlash {
            0% { opacity: 0; }
            80% { opacity: 0; } /* Attends que le train soit proche */
            95% { opacity: 1; } /* Aveugle l'utilisateur */
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="vortex-container" id="vortex">
        <div class="light-trail trail-1"></div>
        <div class="light-trail trail-2"></div>
        <div class="light-trail trail-3"></div>
        <div class="light-trail trail-4"></div>
        <div class="light-trail trail-5"></div>
    </div>

    <svg id="svg-train" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>
        <path d="M25,85 L25,40 C25,15 45,5 50,5 C55,5 75,15 75,40 L75,85 Z" fill="#94a3b8" />
        <path d="M30,85 L30,40 C30,20 45,10 50,10 C55,10 70,20 70,40 L70,85 Z" fill="#cbd5e1" />
        <path d="M35,45 C35,25 45,20 50,20 C55,20 65,25 65,45 L65,55 C65,60 35,60 35,55 Z" fill="#0f172a" />
        <path d="M37,45 C37,30 46,25 50,25 C54,25 63,30 63,45 L63,52 C63,55 37,55 37,52 Z" fill="#0284c7" />
        <circle cx="35" cy="75" r="4" fill="#ffffff" filter="url(#glow)" />
        <circle cx="65" cy="75" r="4" fill="#ffffff" filter="url(#glow)" />
    </svg>

    <div id="flash-overlay"></div>

    <div class="content-wrapper" id="ui-content">
        <h1>TARDIS</h1>
        <p>Voyagez à travers les données temporelles de la SNCF grâce à notre modèle prédictif.</p>

        <div class="button-container">
            <a href="https://dashboardtardis.streamlit.app/" id="btn-dash" class="btn btn-dashboard">
                <span class="icon">🚀</span> Lancer le Dashboard
            </a>
            <a href="article.html" class="btn btn-article">
                <span class="icon">📝</span> Lire l'Article
            </a>
        </div>
    </div>

    <script>
        const btnDash = document.getElementById('btn-dash');
        const trainSvg = document.getElementById('svg-train');
        const uiContent = document.getElementById('ui-content');
        const vortex = document.getElementById('vortex');
        const flash = document.getElementById('flash-overlay');

        btnDash.addEventListener('click', function(event) {
            event.preventDefault(); 
            const link = this.href;

            // 1. Déclenche le tremblement de l'UI
            uiContent.classList.add('screen-shake');
            
            // 2. Accélère le vortex en fond (Hyperspace)
            vortex.classList.add('warp-speed');

            // 3. Fait grossir le train
            trainSvg.classList.add('train-attack');

            // 4. Déclenche le flash lumineux à la fin
            flash.classList.add('flash-boom');

            // 5. Change de page juste au moment où le flash est blanc (1.35s)
            setTimeout(() => {
                window.location.href = link;
            }, 1350); 
        });
    </script>
</body>
</html>
