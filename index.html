<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet TARDIS - Accueil</title>
    <style>
        /* Styles de base pour rendre la page jolie */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0a192f; /* Bleu foncé style TARDIS/Espace */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #8892b0;
        }

        /* Conteneur des boutons */
        .button-container {
            display: flex;
            gap: 20px;
        }

        /* Style général des boutons */
        .btn {
            text-decoration: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid transparent;
        }

        /* Bouton Dashboard (Plein) */
        .btn-dashboard {
            background-color: #3498db;
        }
        .btn-dashboard:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }

        /* Bouton Article (Contour) */
        .btn-article {
            background-color: transparent;
            border: 2px solid #3498db;
            color: #3498db;
        }
        .btn-article:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.2);
        }
    </style>
</head>
<body>

    <h1>🚀 Projet TARDIS</h1>
    <p>Explorez les données temporelles de la SNCF grâce à notre modèle prédictif.</p>

    <div class="button-container">
        <!-- Bouton qui renvoie vers ton tunnel Ngrok -->
        <a href="https://dashboardtardis.streamlit.app/" class="btn btn-dashboard" target="_blank">
            📊 Accéder au Dashboard
        </a>
        
        <!-- Bouton qui renvoie vers la future page article -->
        <a href="article.html" class="btn btn-article">
            📝 Lire l'Article
        </a>
    </div>

</body>
</html>
